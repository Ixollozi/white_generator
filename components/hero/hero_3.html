<section class="block hero hero-split">
  <div class="container" style="display:grid;grid-template-columns:1fr 1fr;gap:2rem;align-items:center;">
    <div>
      <p class="eyebrow">{{ brand_name }}</p>
      <h1>{{ hero_title }}</h1>
      <p class="lead">{{ hero_subtitle }}</p>
      <p><a class="btn" href="{{ hero_cta_href | default('contact.php') }}">{{ hero_cta_label | default('Contact us') }}</a> <a href="services.{{ page_extension }}" style="margin-left:0.5rem;">View services</a></p>
    </div>
    <div style="border-radius:14px;overflow:hidden;border:1px solid #e2e8f0;min-height:12rem;">
      {% if hero_image_src %}
      <img src="{{ hero_image_src }}" alt="{{ hero_image_alt | default(brand_name ~ ' hero', true) }}" width="900" height="600" style="display:block;width:100%;height:100%;min-height:12rem;object-fit:cover;" loading="eager" decoding="async">
      {% else %}
      <div style="min-height:12rem;background:#f1f5f9;"></div>
      {% endif %}
    </div>
  </div>
</section>
