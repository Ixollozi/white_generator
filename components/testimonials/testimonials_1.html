<section class="block testimonials testimonials--cards">
  <div class="container">
    <h2>{{ testimonials_heading }}</h2>
    <div class="grid three">
      {% for t in testimonial_items %}
      <blockquote class="card quote-card">
        {% if t.rating %}<p class="stars" aria-label="Rating" style="letter-spacing:0.08em;">{{ t.rating }}</p>{% endif %}
        <p>“{{ t.quote }}”</p>
        <footer><strong>{{ t.name }}</strong>{% if t.city %}, {{ t.city }}{% endif %} — {{ t.role }}</footer>
      </blockquote>
      {% endfor %}
    </div>
  </div>
</section>
