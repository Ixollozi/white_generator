<!DOCTYPE html>
<html lang="{{ locale | default('en') }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page_title }}</title>
  <meta name="description" content="{{ page_description }}">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="index.php">{{ brand_name }}</a>
      <nav class="nav">
        <a href="index.php">Home</a>
        <a href="about.php">About</a>
        <a href="contact.php">Contact</a>
      </nav>
    </div>
  </header>
  {{ integrations.tracking_html | safe }}
  <main class="site-main">
    {{ body_html | safe }}
    {% set img_items = images.get('items', []) if images else [] %}
    {% if img_items %}
    <section class="container" style="margin: 1.5rem auto;">
      <h2>Gallery</h2>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;">
        {% for item in img_items[:6] %}
        <figure style="margin:0;border:1px solid #e5e7eb;border-radius:10px;overflow:hidden;background:#fff;">
          <img src="{{ item.url }}" alt="{{ item.name }}" style="display:block;width:100%;height:140px;object-fit:cover;">
          <figcaption style="font-size:12px;color:#6b7280;padding:8px;">{{ item.name }}</figcaption>
        </figure>
        {% endfor %}
      </div>
    </section>
    {% endif %}
  </main>
</body>
</html>
