<!DOCTYPE html>
<html lang="{{ locale | default('en') }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page_title }}</title>
  <meta name="description" content="{{ page_description }}">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/minimal.css">
</head>
<body class="minimal-theme">
  <header class="minimal-header">
    <div class="wrap header-row">
      <a class="logo" href="index.php">{{ brand_name }}</a>
      <nav><a href="index.php">Home</a> · <a href="contact.php">Contact</a></nav>
    </div>
  </header>
  {{ integrations.tracking_html | safe }}
  <main class="wrap">
    {{ body_html | safe }}
    {% set img_items = images.get('items', []) if images else [] %}
    {% if img_items %}
    <section style="margin: 1.25rem 0 2rem;">
      <h2 style="margin-bottom:0.6rem;">Photos</h2>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;">
        {% for item in img_items[:6] %}
        <figure style="margin:0;border:1px solid #ddd;border-radius:8px;overflow:hidden;background:#fff;">
          <img src="{{ item.url }}" alt="{{ item.name }}" style="display:block;width:100%;height:130px;object-fit:cover;">
        </figure>
        {% endfor %}
      </div>
    </section>
    {% endif %}
  </main>
</body>
</html>
