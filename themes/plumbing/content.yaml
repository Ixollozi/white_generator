faq_heading: Common questions
faq_items:
  - q: "Do you offer emergency service?"
    a: "Yes — 24/7 dispatch is available for burst pipes, sewage backups, and no-water situations."
  - q: "Are your plumbers licensed?"
    a: "Every technician holds a valid journeyman or master plumber license and carries insurance."
  - q: "Do you provide written estimates?"
    a: "Always. We diagnose first, then present a written quote before any work begins."
