faq_heading: Common questions
faq_items:
  - q: "Do you work in winter?"
    a: "We offer snow removal and winter planning. Design-build projects run March through November in most climates."
  - q: "Can you maintain what another company installed?"
    a: "Yes — we'll assess the existing landscape and build a maintenance plan around it."
  - q: "Do you handle irrigation?"
    a: "We design and install irrigation systems and include them in seasonal startup/shutdown services."
