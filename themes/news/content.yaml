faq_heading: Tips & ethics
faq_items:
  - q: "How can I send a tip?"
    a: "Use the newsroom contact form — include how to reach you and what documents you can share."
  - q: "Do you use AI to write stories?"
    a: "No unsourced AI prose — editors verify claims and attribute reporting."
  - q: "Corrections policy?"
    a: "Material fixes are labeled on the story with a timestamp when feasible."
