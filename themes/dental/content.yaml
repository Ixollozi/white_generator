faq_heading: Patient questions
faq_items:
  - q: "Do you accept my insurance?"
    a: "We work with most major dental plans and will verify your coverage before treatment begins."
  - q: "What if I have dental anxiety?"
    a: "We offer sedation options and take extra time to explain procedures so you feel in control."
  - q: "How often should I schedule a cleaning?"
    a: "Most adults benefit from every six months, but we'll recommend a schedule based on your oral health."
services_seo_description: "{brand_name} provides general, cosmetic, and preventive dental care with upfront pricing, modern equipment, and a patient-first approach."
