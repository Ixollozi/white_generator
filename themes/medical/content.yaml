faq_heading: Patient questions
faq_items:
  - q: "Do you accept walk-ins?"
    a: "We reserve same-day slots for urgent needs. For routine visits, booking ahead ensures shorter wait times."
  - q: "What insurance do you accept?"
    a: "We accept most major plans and will verify your coverage before your appointment."
  - q: "Can I access my records online?"
    a: "Yes — our patient portal gives you access to lab results, visit summaries, and appointment scheduling."
services_seo_description: "{brand_name} offers primary care, diagnostics, and coordinated specialist referrals with same-day availability and a patient-first approach."
